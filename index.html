<script>
window.__preLog = [];
window.__openCvLoadState = 'pending';
function earlyLog(msg) {
  window.__preLog.push(msg);
  try { console.log('[opencv-boot] ' + msg); } catch (e) {}
}
(function () {
  try {
    const resolvedUrl = new URL('opencv.js', document.baseURI).href;
    earlyLog('Спроба завантажити opencv.js за адресою: ' + resolvedUrl);
  } catch (e) {
    earlyLog('Не вдалося обчислити абсолютний шлях до opencv.js: ' + e.message);
  }
})();
function onOpenCvScriptError(ev) {
  window.__openCvLoadState = 'script-error';
  earlyLog('ПОМИЛКА: тег <script src="opencv.js"> не завантажився (onerror).');
  if (window.__cvErrorCallback) window.__cvErrorCallback();
}
function onOpenCvScriptLoaded() {
  window.__openCvLoadState = 'script-loaded';
  earlyLog('Тег <script src="opencv.js"> відпрацював (onload). Перевіряю глобальний cv...');
  if (typeof cv === 'undefined') {
    window.__openCvLoadState = 'cv-undefined';
    earlyLog('ПОМИЛКА: глобальна змінна cv не визначена.');
    if (window.__cvErrorCallback) window.__cvErrorCallback();
    return;
  }
  if (cv && typeof cv.then === 'function') {
    earlyLog('cv є Promise (MODULARIZE-збірка) — чекаю резолву WASM runtime...');
    cv.then(function (resolvedCv) {
      window.cv = resolvedCv;
      window.__openCvLoadState = 'ready';
      earlyLog('cv Promise резолвнувся — WASM runtime готовий.');
      if (window.__cvReadyCallback) window.__cvReadyCallback();
    }).catch(function (err) {
      window.__openCvLoadState = 'promise-rejected';
      earlyLog('ПОМИЛКА: cv Promise відхилено: ' + (err && err.message ? err.message : String(err)));
      if (window.__cvErrorCallback) window.__cvErrorCallback();
    });
  } else {
    earlyLog('cv — не Promise (класична збірка) — підключаю onRuntimeInitialized...');
    cv['onRuntimeInitialized'] = function () {
      window.__openCvLoadState = 'ready';
      earlyLog('onRuntimeInitialized спрацював — WASM runtime готовий.');
      if (window.__cvReadyCallback) window.__cvReadyCallback();
    };
  }
}
</script>
<script async src="opencv.js" onload="onOpenCvScriptLoaded();" onerror="onOpenCvScriptError(event);" type="text/javascript"></script>

<script>
/* ================================================================
   ГЕОМЕТРІЯ ДИСКА — 3 орбіти, маяки на середній (індекс 1)
   ================================================================ */
const DIAGRAM = 500;
const CENTER = { x: DIAGRAM / 2, y: DIAGRAM / 2 };
const LOGO_R = 128;
const LEVEL_RADII = [156, 184, 212];
const FINDER_LEVEL = 1;
const FINDER_R = LEVEL_RADII[FINDER_LEVEL];
const TICK_WIDTH = 7;
const SECTIONS = 4;
const QUADRANT_CENTER_DEG = [0, 90, 180, 270];
const ACTIVE_PER_LEVEL = [12, 18, 24];
const RESERVED_EACH_SIDE = 2;

const FINDER_OUTER_RADIUS = 13;
const FINDER_RING_WIDTH = 4;
const FINDER_GAP_WIDTH = 3;
const FINDER_DOT_RADIUS = FINDER_OUTER_RADIUS - FINDER_RING_WIDTH - FINDER_GAP_WIDTH;

const DISC_BG = '#f5f0e8';

function levelGeometry(levelIndex) {
  const activeCount = ACTIVE_PER_LEVEL[levelIndex];
  const rawCount = activeCount + RESERVED_EACH_SIDE * 2;
  const globalSlots = rawCount * SECTIONS;
  const activeLocalSlots = [];
  for (let s = 0; s < rawCount; s++) {
    if (s < RESERVED_EACH_SIDE || s >= rawCount - RESERVED_EACH_SIDE) continue;
    activeLocalSlots.push(s);
  }
  return {
    radius: LEVEL_RADII[levelIndex], activeCount, rawCount, globalSlots,
    activeLocalSlots, angleStepRad: (Math.PI * 2) / globalSlots
  };
}
const LEVELS = ACTIVE_PER_LEVEL.map((_, i) => levelGeometry(i));

/* ================================================================
   КОДБУК: 33 кирилиці / 26 латиниці (спільні коди-позиції, різні гліфи)
   + 10 цифр + 19 спецсимволів (7 попередніх + 12 нових) + СТАРТ/PAD.
   33 + 10 + 19 + 2 = 64 = 2^6 — рівно стеля 6-бітного символу, вільних
   слотів не лишилось. Тому нижче є ЯВНА перевірка на цю межу: якщо
   колись сюди додадуть ще один символ і вона мовчки пропаде — раніше
   idx.toString(2) міг дати 7+ біт замість 6, і padStart це не обрізає,
   через що ВЕСЬ потік бітів у секції зсувався на позицію — саме це,
   найімовірніше, і зламало канвас минулого разу навіть без вводу
   (майже всі 27 символьних слотів порожнього повідомлення — це один і
   той самий символ PAD, тому зсув на 1 біт у ньому одразу спотворює
   геометрію по всьому диску).
   ================================================================ */
const CYRILLIC_LETTERS = "АБВГҐДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ".split('');
// 26 букв латиниці + null на решту 7 слотів (той самий слот "букви",
// що й кирилиця, просто в латинському режимі там нема гліфа — не займає
// зайвої місткості кодування, лишається просто невживаним у цьому режимі).
const LATIN_LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').concat([null, null, null, null, null, null, null]);
if (CYRILLIC_LETTERS.length !== LATIN_LETTERS.length) {
  throw new Error('CYRILLIC_LETTERS і LATIN_LETTERS мають бути однакової довжини (спільні коди-позиції).');
}
const LETTER_SLOT_COUNT = CYRILLIC_LETTERS.length; // 33

const DIGIT_CHARS = "0123456789".split('');
// Спецсимволи: 7 початкових + 11 нових (не 12 — один слот віддано під
// другий СТАРТ-символ нижче, щоб прапорець мови не потребував окремої
// мітки на диску, а розпізнавався одночасно зі СТАРТ-символом).
const SPECIAL_CHARS = " .,@'+-".split('').concat(':;()%/*=#"_'.split(''));

// ДВА СТАРТ-символи замість одного: СТАРТ і так має бути надійно
// знайдений decoder'ом, щоб визначити правильний поворот зчитаних 4
// секцій (reassembleWithRotation перебирає 4 повороти й шукає СТАРТ на
// позиції 0). Замість окремої ізольованої мітки на диску (яка додала
// зайву видиму цятку і плутанину біля маяка), мова кодується просто
// ЯКИЙ САМЕ зі СТАРТів знайдено — той самий факт розпізнавання, без
// жодної додаткової геометрії чи окремого коду детекції.
const START_UK_CHAR = '\u0001';
const START_EN_CHAR = '\u0003';
const PAD_CHAR = '\u0002';
const BITS_PER_SYMBOL = 6;
const CODEBOOK_MAX = 1 << BITS_PER_SYMBOL; // 64

// Кодбук індексується так: [0..32]=букви (мовозалежний гліф), [33..42]=цифри,
// [43..60]=спецсимволи, [61]=СТАРТ-укр, [62]=СТАРТ-англ, [63]=PAD.
const NON_LETTER_CODEBOOK = DIGIT_CHARS.concat(SPECIAL_CHARS).concat([START_UK_CHAR, START_EN_CHAR, PAD_CHAR]);
const CODEBOOK_LENGTH = LETTER_SLOT_COUNT + NON_LETTER_CODEBOOK.length;
if (CODEBOOK_LENGTH > CODEBOOK_MAX) {
  const msg = `КРИТИЧНО: кодбук (${CODEBOOK_LENGTH} символів) перевищує межу 6-бітного символу (${CODEBOOK_MAX}). ` +
    `Заберіть зайві символи — інакше кодування бітів мовчки зсунеться і диск стане нечитабельним.`;
  earlyLog ? earlyLog(msg) : console.error(msg);
  throw new Error(msg);
}
const START_UK_IDX = LETTER_SLOT_COUNT + DIGIT_CHARS.length + SPECIAL_CHARS.length;
const START_EN_IDX = START_UK_IDX + 1;
const PAD_IDX = START_EN_IDX + 1;

function glyphTable(lang) {
  return (lang === 'en' ? LATIN_LETTERS : CYRILLIC_LETTERS).concat(NON_LETTER_CODEBOOK);
}
function charToIndex(ch, lang) {
  if (ch === START_UK_CHAR) return START_UK_IDX;
  if (ch === START_EN_CHAR) return START_EN_IDX;
  if (ch === PAD_CHAR) return PAD_IDX;
  const table = glyphTable(lang);
  return table.indexOf(ch);
}
function indexToChar(idx, lang) {
  if (idx === START_UK_IDX) return START_UK_CHAR;
  if (idx === START_EN_IDX) return START_EN_CHAR;
  if (idx === PAD_IDX) return PAD_CHAR;
  const table = glyphTable(lang);
  return table[idx];
}


/* Прапорець мови більше не потребує окремої мітки на диску — див.
   START_UK_CHAR/START_EN_CHAR вище. Який зі СТАРТів знайде
   reassembleWithRotation при пошуку правильного повороту — та й мова. */
const MESSAGE_CHARS_FOR_UI = { uk: CYRILLIC_LETTERS.filter(Boolean), en: LATIN_LETTERS.filter(Boolean) };


const ACTIVE_BITS_PER_SECTION = LEVELS.reduce((sum, l) => sum + l.activeCount, 0);
const DATA_SYMBOL_SLOTS = Math.floor((ACTIVE_BITS_PER_SECTION * 3) / BITS_PER_SYMBOL);
const SYMBOLS_PER_SECTION = DATA_SYMBOL_SLOTS / 3;
const MAX_MESSAGE_LEN = DATA_SYMBOL_SLOTS - 2;

document.getElementById('maxLenLabel').textContent = MAX_MESSAGE_LEN;

let currentLang = 'uk'; // 'uk' | 'en'

function renderAlphabetBlocks() {
  const letters = currentLang === 'en' ? MESSAGE_CHARS_FOR_UI.en : MESSAGE_CHARS_FOR_UI.uk;
  document.getElementById('blockLetters').innerHTML = '<strong>Букви:</strong> ' + letters.join(' ');
  document.getElementById('blockDigits').innerHTML = '<strong>Цифри:</strong> ' + DIGIT_CHARS.join(' ');
  document.getElementById('blockSpecial').innerHTML = '<strong>Спец:</strong> ' + SPECIAL_CHARS.join(' ');
  document.getElementById('langLabel').textContent = currentLang === 'en' ? 'латиниця' : 'кирилиця';
  document.getElementById('langToggleBtn').textContent = currentLang === 'en' ? 'ENG' : 'УКР';
}
document.getElementById('capacityNote').textContent =
  `Місткість: ${ACTIVE_BITS_PER_SECTION} біт/секцію × 3 секції даних = ${DATA_SYMBOL_SLOTS} символьних слотів → максимум ${MAX_MESSAGE_LEN} символів.`;

function textToSections(message, lang) {
  if (message.length > MAX_MESSAGE_LEN) {
    throw new Error('Задовге повідомлення (максимум ' + MAX_MESSAGE_LEN + ')');
  }
  const symbols = [(lang === 'en' ? START_EN_CHAR : START_UK_CHAR)].concat(message.split(''));
  while (symbols.length < DATA_SYMBOL_SLOTS) symbols.push(PAD_CHAR);

  const sections = [[], [], []];
  for (let i = 0; i < DATA_SYMBOL_SLOTS; i++) {
    const ch = symbols[i];
    const idx = charToIndex(ch, lang);
    if (idx === -1 || idx === undefined) {
      log('Помилка: символ "' + ch + '" не підтримується в поточній мові.');
      throw new Error('Символ "' + ch + '" не підтримується в поточній мові (' + lang + ').');
    }
    const bin = idx.toString(2).padStart(BITS_PER_SYMBOL, '0');
    for (const b of bin) sections[i % 3].push(b === '1' ? 1 : 0);
  }
  const checksum = new Array(ACTIVE_BITS_PER_SECTION).fill(0);
  for (let i = 0; i < ACTIVE_BITS_PER_SECTION; i++) {
    checksum[i] = sections[0][i] ^ sections[1][i] ^ sections[2][i];
  }
  sections.push(checksum);
  return sections;
}

function sectionBitsToLevels(sectionBitsFlat) {
  const levels = [];
  let cursor = 0;
  for (const lvl of LEVELS) {
    levels.push(sectionBitsFlat.slice(cursor, cursor + lvl.activeCount));
    cursor += lvl.activeCount;
  }
  return levels;
}

function sectionBitsToPhysicalLevels(sectionBitsFlat) {
  const levelBits = sectionBitsToLevels(sectionBitsFlat);
  return LEVELS.map((lvl, i) => {
    const physical = new Array(lvl.rawCount).fill(0);
    lvl.activeLocalSlots.forEach((slot, k) => { physical[slot] = levelBits[i][k]; });
    return physical;
  });
}

function decodeSectionsToText(sections, lang) {
  let text = '';
  for (let pos = 0; pos < SYMBOLS_PER_SECTION; pos++) {
    for (let sec = 0; sec < 3; sec++) {
      const bits = sections[sec].slice(pos * BITS_PER_SYMBOL, (pos + 1) * BITS_PER_SYMBOL);
      const idx = parseInt(bits.join(''), 2);
      const ch = indexToChar(idx, lang);
      if (ch === START_UK_CHAR || ch === START_EN_CHAR) continue;
      if (ch === PAD_CHAR) return text;
      text += (ch === undefined || ch === null) ? '?' : ch;
    }
  }
  return text;
}


/* ================================================================
   МАЛЮВАННЯ ЕНКОДЕРА
   ================================================================ */
const bitsColor = document.getElementById('bitsColor');
const anchorsColor = document.getElementById('anchorsColor');
const clearLogoBtn = document.getElementById('clearLogoBtn');
const langToggleBtn = document.getElementById('langToggleBtn');

function drawFinder(ctx, cx, cy, transparentBg) {
  if (transparentBg) {
    // Замість заливки кольором диска — реально прозора "дірка" під кільцем
    // маяка, незалежно від того, що намальовано під ним (дуга бітів).
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(cx, cy, FINDER_OUTER_RADIUS, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else {
    ctx.fillStyle = DISC_BG;
    ctx.beginPath(); ctx.arc(cx, cy, FINDER_OUTER_RADIUS, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = anchorsColor.value;
  ctx.lineWidth = FINDER_RING_WIDTH;
  ctx.beginPath();
  ctx.arc(cx, cy, FINDER_OUTER_RADIUS - FINDER_RING_WIDTH / 2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = anchorsColor.value;
  ctx.beginPath(); ctx.arc(cx, cy, FINDER_DOT_RADIUS, 0, Math.PI * 2); ctx.fill();
}

function extractRuns(full) {
  const globalSlots = full.length;
  const visited = new Array(globalSlots).fill(false);
  const runs = [];
  for (let i = 0; i < globalSlots; i++) {
    if (full[i] === 1 && !visited[i]) {
      let end = i, count = 1;
      visited[i] = true;
      while (full[(end + 1) % globalSlots] === 1 && !visited[(end + 1) % globalSlots]) {
        end = (end + 1) % globalSlots;
        visited[end] = true;
        count++;
        if (count >= globalSlots) break;
      }
      runs.push({ start: i, end, full: count >= globalSlots });
    }
  }
  return runs;
}

function drawDataRing(ctx, lvl, full) {
  const paddingAngle = (lvl.angleStepRad * 180 / Math.PI) * 0.22 * Math.PI / 180;
  const runs = extractRuns(full);

  for (const run of runs) {
    if (run.full) {
      ctx.beginPath();
      ctx.arc(CENTER.x, CENTER.y, lvl.radius, 0, Math.PI * 2, false);
      ctx.lineWidth = TICK_WIDTH;
      ctx.strokeStyle = bitsColor.value;
      ctx.stroke();
      continue;
    }

    let startAngle = run.start * lvl.angleStepRad + paddingAngle;
    let endAngle = (run.end + 1) * lvl.angleStepRad - paddingAngle;
    if (endAngle < startAngle) endAngle += Math.PI * 2;

    ctx.beginPath();
    ctx.arc(CENTER.x, CENTER.y, lvl.radius, startAngle, endAngle, false);
    ctx.lineWidth = TICK_WIDTH;
    ctx.lineCap = 'round';
    ctx.strokeStyle = bitsColor.value;
    ctx.stroke();
  }
}

bitsColor.addEventListener('input', refresh);
anchorsColor.addEventListener('input', refresh);

  currentLang = currentLang === 'en' ? 'uk' : 'en';
  renderAlphabetBlocks();

  log(`Мова вводу перемкнена на: ${currentLang === 'en' ? 'латиниця' : 'кирилиця'}.`);
});

function computeFullByLevel(sections) {
  const fullByLevel = LEVELS.map(lvl => new Array(lvl.globalSlots).fill(0));
  for (let s = 0; s < SECTIONS; s++) {
    const physicalLevels = sectionBitsToPhysicalLevels(sections[s]);
    const targetSection = (s + 3) % SECTIONS;
    LEVELS.forEach((lvl, li) => {
      for (let localSlot = 0; localSlot < lvl.rawCount; localSlot++) {
        const globalSlot = (targetSection * lvl.rawCount + localSlot) % lvl.globalSlots;
        fullByLevel[li][globalSlot] = physicalLevels[li][localSlot];
      }
    });
  }
  return fullByLevel;
}

function render(ctx, sections, logoImg, lang, opts) {
  const transparentBg = !!(opts && opts.transparentBg);
  ctx.clearRect(0, 0, DIAGRAM, DIAGRAM);
  if (!transparentBg) {
    ctx.fillStyle = DISC_BG;
    ctx.fillRect(0, 0, DIAGRAM, DIAGRAM);
  }

  const fullByLevel = computeFullByLevel(sections);

  LEVELS.forEach((lvl, li) => drawDataRing(ctx, lvl, fullByLevel[li]));

  // Мова більше не малюється окремо: вона вже "всередині" бітів
  // СТАРТ-символу (START_UK_CHAR/START_EN_CHAR), який і так кодується
  // як звичайний символьний слот на позиції 0 — жодної додаткової
  // геометрії на диску для цього більше не потрібно.

  for (const deg of QUADRANT_CENTER_DEG) {
    const rad = deg * Math.PI / 180;
    const fx = CENTER.x + Math.cos(rad) * FINDER_R;
    const fy = CENTER.y + Math.sin(rad) * FINDER_R;
    drawFinder(ctx, fx, fy, transparentBg);
  }

  ctx.save();
  ctx.beginPath();
  ctx.arc(CENTER.x, CENTER.y, LOGO_R, 0, Math.PI * 2);
  ctx.clip();
  if (logoImg) {
    const coverScale = Math.max((LOGO_R * 2) / logoImg.width, (LOGO_R * 2) / logoImg.height);
    const scale = coverScale * logoScale;
    const w = logoImg.width * scale, h = logoImg.height * scale;
    ctx.drawImage(logoImg, logoX - w / 2, logoY - h / 2, w, h);
  } else if (!transparentBg) {
    ctx.fillStyle = DISC_BG;
    ctx.fillRect(CENTER.x - LOGO_R, CENTER.y - LOGO_R, LOGO_R * 2, LOGO_R * 2);
  }
  ctx.restore();
}

/* ================================================================
   SVG-ЕКСПОРТ — біти + маяки як один шар (без лого й без фону диска,
   щоб можна було накласти на будь-яке власне тло в дизайн-редакторі).
   Використовує ті самі extractRuns/computeFullByLevel, що й canvas-
   рендер, тому геометрія гарантовано не розходиться з PNG.
   ================================================================ */
// Товщина дуг/кілець "запечена" у саму геометрію контуру (заповнені
// форми), а не задана через stroke-width. Це навмисно: заливка завжди
// масштабується разом з об'єктом, а обведення (stroke) — ні, якщо у
// векторному редакторі (типово в Corel) вимкнено "масштабувати перо
// разом з об'єктом". При зменшенні товщина лінії лишалась би фізично
// незмінною, проміжки між сусідніми бітами ставали б тонші за неї —
// і диск зливався б в суцільне кільце.
function svgAnnulusPath(cx, cy, rOuter, rInner) {
  const f = (n) => n.toFixed(2);
  return `M ${f(cx + rOuter)} ${f(cy)} ` +
    `A ${rOuter} ${rOuter} 0 1 1 ${f(cx - rOuter)} ${f(cy)} ` +
    `A ${rOuter} ${rOuter} 0 1 1 ${f(cx + rOuter)} ${f(cy)} Z ` +
    `M ${f(cx + rInner)} ${f(cy)} ` +
    `A ${rInner} ${rInner} 0 1 0 ${f(cx - rInner)} ${f(cy)} ` +
    `A ${rInner} ${rInner} 0 1 0 ${f(cx + rInner)} ${f(cy)} Z`;
}
function svgThickArcPath(cx, cy, r, startAngle, endAngle, halfWidth) {
  const rOuter = r + halfWidth, rInner = r - halfWidth;
  const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
  const pt = (rad, ang) => ({ x: cx + rad * Math.cos(ang), y: cy + rad * Math.sin(ang) });
  const p1 = pt(rOuter, startAngle), p2 = pt(rOuter, endAngle);
  const p3 = pt(rInner, endAngle), p4 = pt(rInner, startAngle);
  const f = (n) => n.toFixed(2);
  return `M ${f(p1.x)} ${f(p1.y)} ` +
    `A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${f(p2.x)} ${f(p2.y)} ` +
    `A ${halfWidth} ${halfWidth} 0 0 1 ${f(p3.x)} ${f(p3.y)} ` +
    `A ${rInner} ${rInner} 0 ${largeArc} 0 ${f(p4.x)} ${f(p4.y)} ` +
    `A ${halfWidth} ${halfWidth} 0 0 1 ${f(p1.x)} ${f(p1.y)} Z`;
}

function buildLayerSVG(sections) {
  const fullByLevel = computeFullByLevel(sections);
  const bits = bitsColor.value;
  const anchors = anchorsColor.value;
  const parts = [];

  LEVELS.forEach((lvl, li) => {
    const paddingAngle = (lvl.angleStepRad * 180 / Math.PI) * 0.22 * Math.PI / 180;
    const runs = extractRuns(fullByLevel[li]);
    for (const run of runs) {
      if (run.full) {
        const d = svgAnnulusPath(CENTER.x, CENTER.y, lvl.radius + TICK_WIDTH / 2, lvl.radius - TICK_WIDTH / 2);
        parts.push(`<path fill-rule="evenodd" fill="${bits}" d="${d}" />`);
        continue;
      }
      let startAngle = run.start * lvl.angleStepRad + paddingAngle;
      let endAngle = (run.end + 1) * lvl.angleStepRad - paddingAngle;
      if (endAngle < startAngle) endAngle += Math.PI * 2;

      const d = svgThickArcPath(CENTER.x, CENTER.y, lvl.radius, startAngle, endAngle, TICK_WIDTH / 2);
      parts.push(`<path fill="${bits}" d="${d}" />`);
    }
  });

  for (const deg of QUADRANT_CENTER_DEG) {
    const rad = deg * Math.PI / 180;
    const fx = CENTER.x + Math.cos(rad) * FINDER_R;
    const fy = CENTER.y + Math.sin(rad) * FINDER_R;
    // Проміжок кільце/крапка навмисно нічим не заповнений — лишається
    // прозорим, щоб шар можна було накласти на будь-яке власне тло.
    const ringD = svgAnnulusPath(fx, fy, FINDER_OUTER_RADIUS, FINDER_OUTER_RADIUS - FINDER_RING_WIDTH);
    parts.push(`<path fill-rule="evenodd" fill="${anchors}" d="${ringD}" />`);
    parts.push(`<circle cx="${fx.toFixed(2)}" cy="${fy.toFixed(2)}" r="${FINDER_DOT_RADIUS}" fill="${anchors}" />`);
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${DIAGRAM} ${DIAGRAM}" width="${DIAGRAM}" height="${DIAGRAM}">\n` +
    `<g id="round-code-layer">\n${parts.join('\n')}\n</g>\n</svg>`;
}

/* ================================================================
   ДЖОЙСТИК ПОЗИЦІОНУВАННЯ ЛОГО — 4-сторонні кнопки замість

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

let openCvReady = false;

  }

    log(`Попередження: OpenCV досі не готовий через 12с (стан: ${window.__openCvLoadState}).`);
  }

function oddify(n) { return (n % 2 === 0) ? n + 1 : n; }
const ADAPTIVE_C = 6;
const MIN_MARKER_AREA = 6;
const DOT_AREA_RATIO_MIN = 0.06;
const DOT_AREA_RATIO_MAX = 0.5;
const CONCENTRIC_TOL = 0.4;

function detectBullseyeCandidates(imgData, W, H) {
  let src, gray, bin, hierarchy, contours;
  let contourMats = [];
  const candidates = [];
  try {
    src = cv.matFromImageData(imgData);
    gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    bin = new cv.Mat();
    const blockSize = Math.max(11, Math.min(51, oddify(Math.round(Math.min(W, H) / 16))));
    cv.adaptiveThreshold(gray, bin, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, blockSize, ADAPTIVE_C);

    contours = new cv.MatVector();
    hierarchy = new cv.Mat();
    cv.findContours(bin, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

    const n = contours.size();
    for (let i = 0; i < n; i++) contourMats.push(contours.get(i));
    const hData = hierarchy.data32S;

    for (let i = 0; i < n; i++) {
      const area = cv.contourArea(contourMats[i]);
      if (area < MIN_MARKER_AREA) continue;
      const holeIdx = hData[i * 4 + 2];
      if (holeIdx < 0) continue;
      const dotIdx = hData[holeIdx * 4 + 2];
      if (dotIdx < 0) continue;

      const dotArea = cv.contourArea(contourMats[dotIdx]);
      const ratio = dotArea / area;
      if (ratio < DOT_AREA_RATIO_MIN || ratio > DOT_AREA_RATIO_MAX) continue;

      const mOuter = cv.moments(contourMats[i]);
      const mDot = cv.moments(contourMats[dotIdx]);
      if (mOuter.m00 <= 0 || mDot.m00 <= 0) continue;
      const cxOuter = mOuter.m10 / mOuter.m00, cyOuter = mOuter.m01 / mOuter.m00;
      const cxDot = mDot.m10 / mDot.m00, cyDot = mDot.m01 / mDot.m00;
      const radius = Math.sqrt(area / Math.PI);
      if (Math.hypot(cxOuter - cxDot, cyOuter - cyDot) > radius * CONCENTRIC_TOL) continue;

      candidates.push({ x: cxOuter, y: cyOuter, radius });
    }

  } finally {
    if (contourMats && contourMats.length > 0) {
      contourMats.forEach(m => {
        if (m && typeof m.delete === 'function') m.delete();
      });
    }
    if (src) src.delete();
    if (gray) gray.delete();
    if (bin) bin.delete();
    if (hierarchy) hierarchy.delete();
    if (contours) contours.delete();
  }
  return candidates;
}

function axisToCyclicPoints(p0, p2) {
  const mx = (p0.x + p2.x) / 2, my = (p0.y + p2.y) / 2;
  const dx = p2.x - p0.x, dy = p2.y - p0.y;
  const half = Math.hypot(dx, dy) / 2;
  const px = -dy / (half * 2), py = dx / (half * 2);
  const p1 = { x: mx + px * half, y: my + py * half };
  const p3 = { x: mx - px * half, y: my - py * half };
  const cross = (p1.x - p0.x) * (p2.y - p1.y) - (p1.y - p0.y) * (p2.x - p1.x);
  return cross >= 0 ? [p0, p1, p2, p3] : [p0, p3, p2, p1];
}

function nearestCandidate(candidates, predicted, tolPx) {
  let best = null, bestD = Infinity;
  for (const c of candidates) {
    const d = dist(c, predicted);
    if (d < tolPx && d < bestD) { bestD = d; best = c; }
  }
  return best;
}

const COLD_FAN_DEG = 75;
const COLD_DIST_MIN_RATIO = 0.55;
const COLD_DIST_MAX_RATIO = 2.0;
const SIDE_MATCH_TOL_FACTOR = 0.8;

const QUAD_RADIUS_SPREAD_MAX = 0.6; // (max-min)/med радіусів — щоб не обрати випадковий шумовий контур за 4-й маяк

// Коли OpenCV вже реально знайшов ≥4 кандидати (типово і під кутом теж —
// нахил змінює їхню форму на диску, але не заважає їх виявити), не варто
// вгадувати позиції бічних маяків через ідеальний перпендикуляр до осі
// (те припущення правильне лише для виду майже прямо зверху/збоку).
// Замість цього беремо реально знайдені точки й просто впорядковуємо їх
// за кутом навколо їхнього спільного центру — той самий напрямок обходу,
// що й у axisToCyclicPoints, тож сумісний з рештою пайплайна без змін.
function coldStartFromQuad(candidates) {
  let chosen = candidates;
  if (chosen.length > 4) {
    const radii = chosen.map(c => c.radius).slice().sort((a, b) => a - b);
    const med = radii[Math.floor(radii.length / 2)];
    chosen = chosen.slice().sort((a, b) => Math.abs(a.radius - med) - Math.abs(b.radius - med)).slice(0, 4);
  }
  if (chosen.length !== 4) return null;

  const radii = chosen.map(c => c.radius);
  const minR = Math.min(...radii), maxR = Math.max(...radii), medR = radii.slice().sort((a, b) => a - b)[1];
  if (medR <= 0 || (maxR - minR) / medR > QUAD_RADIUS_SPREAD_MAX) return null;

  const cx = chosen.reduce((s, c) => s + c.x, 0) / 4;
  const cy = chosen.reduce((s, c) => s + c.y, 0) / 4;
  const ordered = chosen.slice().sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));
  const avgRadius = radii.reduce((s, r) => s + r, 0) / 4;
  return { ok: true, points: ordered, scalePx: avgRadius };
}

function coldStartFromCandidates(candidates) {
  if (candidates.length < 2) {
    return { ok: false, reason: `замало підтверджених маяків (${candidates.length})` };
  }

  const quad = coldStartFromQuad(candidates);
  if (quad) return quad;

  const sorted = candidates.slice().sort((a, b) => b.y - a.y);
  const p0 = sorted[0];
  const distEstimate = p0.radius * (FINDER_R * 2 / FINDER_OUTER_RADIUS);

  let best2 = null, bestDiff = Infinity;
  for (const c of candidates) {
    if (c === p0) continue;
    const dx = c.x - p0.x, dy = c.y - p0.y;
    const d = Math.hypot(dx, dy);
    if (d < distEstimate * COLD_DIST_MIN_RATIO || d > distEstimate * COLD_DIST_MAX_RATIO) continue;
    const angFromUp = Math.acos(Math.max(-1, Math.min(1, (-dy) / d))) * 180 / Math.PI;
    if (angFromUp > COLD_FAN_DEG) continue;
    const diff = Math.abs(d - distEstimate);
    if (diff < bestDiff) { bestDiff = diff; best2 = c; }
  }
  if (!best2) {
    return { ok: false, reason: `якір є (r=${p0.radius.toFixed(1)}px), пари не знайдено` };
  }

  const cyclic = axisToCyclicPoints(p0, best2);
  const tol = Math.max(10, p0.radius * SIDE_MATCH_TOL_FACTOR);
  const side1 = nearestCandidate(candidates, cyclic[1], tol);
  const side3 = nearestCandidate(candidates, cyclic[3], tol);
  if (!side1 || !side3) {
    return { ok: false, reason: 'вісь знайдена, бокові маяки не підтверджені' };
  }
  return { ok: true, points: [p0, side1, best2, side3], scalePx: p0.radius };
}

function trackedFromCandidates(candidates, predictedPts, scalePx) {
  const tol = Math.max(12, scalePx * 0.9);
  const found = predictedPts.map(p => nearestCandidate(candidates, p, tol));
  if (found.some(f => !f)) return { ok: false, foundCount: found.filter(Boolean).length };
  return { ok: true, points: found };
}

/* ================================================================
   ЧИТАННЯ БІТІВ — cv.warpPerspective + cv.adaptiveThreshold
   (порт із перевіреного референсу; локально-адаптивний поріг замість
   глобального мін/макс по рівню, тому стійкий до нерівного освітлення)
   ================================================================ */
function sampleAllLevelsMat(imgData, pts) {
  let src, gray, warped, thresh, trans;
  const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    pts[0].x, pts[0].y, pts[1].x, pts[1].y,
    pts[2].x, pts[2].y, pts[3].x, pts[3].y
  ]);
  const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
    CENTER.x, CENTER.y - FINDER_R,
    CENTER.x + FINDER_R, CENTER.y,
    CENTER.x, CENTER.y + FINDER_R,
    CENTER.x - FINDER_R, CENTER.y
  ]);
  const physicalSections = [];
  for (let sec = 0; sec < SECTIONS; sec++) physicalSections.push(LEVELS.map(lvl => new Array(lvl.activeCount).fill(0)));
  try {
    src = cv.matFromImageData(imgData);
    gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    trans = cv.getPerspectiveTransform(srcPts, dstPts);
    warped = new cv.Mat();
    cv.warpPerspective(gray, warped, trans, new cv.Size(DIAGRAM, DIAGRAM));
    thresh = new cv.Mat();
    cv.adaptiveThreshold(warped, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 5);
    LEVELS.forEach((lvl, li) => {
      for (let sec = 0; sec < SECTIONS; sec++) {
        lvl.activeLocalSlots.forEach((slot, k) => {
          const globalSlot = sec * lvl.rawCount + slot;
          const angle = (globalSlot + 0.5) * lvl.angleStepRad;
          const lx = CENTER.x + Math.cos(angle) * lvl.radius;
          const ly = CENTER.y + Math.sin(angle) * lvl.radius;
          const px = Math.round(lx);
          const py = Math.round(ly);
          if (px >= 0 && px < DIAGRAM && py >= 0 && py < DIAGRAM) {
            physicalSections[sec][li][k] = thresh.ucharPtr(py, px)[0] > 128 ? 1 : 0;
          }
        });
      }
    });
  } finally {
    if (src) src.delete(); if (gray) gray.delete(); if (warped) warped.delete();
    if (thresh) thresh.delete(); if (trans) trans.delete();
    srcPts.delete(); dstPts.delete();
  }
  return { physicalSections };
}

function reassembleWithRotation(physicalSections) {
  const matches = [];
  for (let rot = 0; rot < SECTIONS; rot++) {
    const sections = [0, 1, 2, 3].map(logicalIdx => {
      const p = (logicalIdx + rot) % SECTIONS;
      return physicalSections[p].reduce((acc, arr) => acc.concat(arr), []);
    });
    const first6 = sections[0].slice(0, BITS_PER_SYMBOL);
    const idx = parseInt(first6.join(''), 2);
    // Який зі СТАРТів знайдено на позиції 0 — та й мова: жодної
    // окремої мітки на диску для цього більше не потрібно.
    if (idx === START_UK_IDX) matches.push({ sections, rot, lang: 'uk' });
    else if (idx === START_EN_IDX) matches.push({ sections, rot, lang: 'en' });
  }

  if (matches.length === 1) {
    return { sections: matches[0].sections, rot: matches[0].rot, startOk: true, ambiguous: false, lang: matches[0].lang };
  }

  // 0 збігів — валідного старту немає; 2+ збігів — неоднозначно, який
  // поворот правильний насправді (можливо лише як рідкісний випадковий
  // збіг, ~1/32 шансу на кожен "не той" поворот). В обох випадках кадр
  // НЕ приймається — замість тихого вибору першого-ліпшого повороту.
  const sections0 = [0, 1, 2, 3].map(logicalIdx => physicalSections[logicalIdx].reduce((acc, arr) => acc.concat(arr), []));
  return { sections: sections0, rot: 0, startOk: false, ambiguous: matches.length > 1, lang: 'uk' };
}

function checksumAgreement(sections) {
  const [d0, d1, d2, cs] = sections;
  let agree = 0;
  for (let i = 0; i < ACTIVE_BITS_PER_SECTION; i++) {
    if ((d0[i] ^ d1[i] ^ d2[i]) === cs[i]) agree++;
  }
  return agree / ACTIVE_BITS_PER_SECTION;
}

function detectAndDecode(imgData, W, H, hiImgData, hiW, hiH) {
  if (!openCvReady) return { ok: false, reason: 'OpenCV ще завантажується...', mode: 'loading' };

  const candidates = detectBullseyeCandidates(imgData, W, H);
  let pts, scalePx, mode;

  if (smoothedAxis) {
    const predicted = axisToCyclicPoints(smoothedAxis.p0, smoothedAxis.p2);
    const tr = trackedFromCandidates(candidates, predicted, smoothedAxis.scalePx);
    if (tr.ok) { pts = tr.points; scalePx = smoothedAxis.scalePx; mode = 'tracked'; }
  }

  if (!pts) {
    const cs = coldStartFromCandidates(candidates);
    if (!cs.ok) {
      trackingMiss();
      return { ok: false, reason: `${cs.reason} [маяків у кадрі: ${candidates.length}]`, mode: 'cold-fail' };
    }
    pts = cs.points; scalePx = cs.scalePx; mode = 'cold';
  }

  const useHiRes = hiImgData && hiW && hiH;
  const sampleImg = useHiRes ? hiImgData : imgData;
  const scale = useHiRes ? (hiW / W) : 1;
  const samplePts = useHiRes ? pts.map(p => ({ x: p.x * scale, y: p.y * scale })) : pts;

  const { physicalSections } = sampleAllLevelsMat(sampleImg, samplePts);
  const { sections, startOk, ambiguous, lang } = reassembleWithRotation(physicalSections);
  const agreement = checksumAgreement(sections);

  updateAxisState(pts, scalePx);

  return { ok: true, mode, pts, scalePx, sections, startOk, ambiguous, agreement, lang };
}

const AXIS_EMA_ALPHA = 0.35;
const TRACK_LOST_AFTER = 6;
let smoothedAxis = null;
let trackMissCount = 0;

function updateAxisState(pts, scalePx) {
  const p0 = pts[0], p2 = pts[2];
  if (!smoothedAxis) {
    smoothedAxis = { p0: { ...p0 }, p2: { ...p2 }, scalePx };
  } else {
    const a = AXIS_EMA_ALPHA;
    smoothedAxis = {
      p0: { x: smoothedAxis.p0.x * (1 - a) + p0.x * a, y: smoothedAxis.p0.y * (1 - a) + p0.y * a },
      p2: { x: smoothedAxis.p2.x * (1 - a) + p2.x * a, y: smoothedAxis.p2.y * (1 - a) + p2.y * a },
      scalePx: smoothedAxis.scalePx * (1 - a) + scalePx * a
    };
  }
  trackMissCount = 0;
}
function trackingMiss() {
  trackMissCount++;
  if (trackMissCount >= TRACK_LOST_AFTER) { smoothedAxis = null; }
}
function resetTracking() { smoothedAxis = null; trackMissCount = 0; }

const CONFIRM_STREAK = 3;
const MIN_AGREEMENT = 0.93;
const STABILITY_TOL_PX = 14;
let recentCentroids = [];
let recentTexts = [];
function centroidOf(pts) { return { x: pts.reduce((s,p)=>s+p.x,0)/pts.length, y: pts.reduce((s,p)=>s+p.y,0)/pts.length }; }
function resetStability() { recentCentroids = []; recentTexts = []; }
function checkStability(centroid, text) {
  recentCentroids.push(centroid);
  recentTexts.push(text);
  if (recentCentroids.length > CONFIRM_STREAK) { recentCentroids.shift(); recentTexts.shift(); }
  if (recentCentroids.length < CONFIRM_STREAK) return false;
  const allSameText = recentTexts.every(t => t === recentTexts[recentTexts.length - 1]);
  if (!allSameText) return false;
  const ref = recentCentroids[recentCentroids.length - 1];
  for (const c of recentCentroids) {
    if (Math.hypot(c.x - ref.x, c.y - ref.y) > STABILITY_TOL_PX) return false;
  }
  return true;
}

let camStream = null;
let scanTimer = null;
let locked = false;

function drawGuide(W, H) {
  const gc = document.getElementById('guideCanvas');
  gc.width = W; gc.height = H;
  const g = gc.getContext('2d');
  g.clearRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const beaconR = Math.min(W, H) * 0.42 * (FINDER_R / 225);

  g.fillStyle = 'rgba(0,0,0,0.6)';
  g.fillRect(0, 0, W, H);
  g.globalCompositeOperation = 'destination-out';
  g.fillStyle = '#000';
  g.beginPath(); g.arc(cx, cy, beaconR, 0, Math.PI * 2); g.fill();
  g.globalCompositeOperation = 'source-over';
  g.save();
  g.setLineDash([4, 4]);
  g.lineWidth = 1.5;
  g.strokeStyle = '#ffffff';
  g.beginPath(); g.arc(cx, cy, beaconR, 0, Math.PI * 2); g.stroke();
  g.restore();
  g.strokeStyle = 'rgba(255,255,255,0.4)';
  g.lineWidth = 1;
  g.beginPath();
  g.moveTo(cx - 8, cy); g.lineTo(cx + 8, cy);
  g.moveTo(cx, cy - 8); g.lineTo(cx, cy + 8);
  g.stroke();
  g.font = '11px monospace';
  g.textAlign = 'center';
  g.fillStyle = 'rgba(255,255,255,0.5)';
  g.fillText('тримайте диск у межах кола', cx, (cy + beaconR + 16 < H - 4) ? cy + beaconR + 16 : cy - beaconR - 8);
}
function clearGuide() {
  const gc = document.getElementById('guideCanvas');
  gc.getContext('2d').clearRect(0, 0, gc.width, gc.height);
}
window.addEventListener('resize', () => {
  if (camStream) {
    const wrap = document.getElementById('camWrap');
    drawGuide(wrap.clientWidth || 320, wrap.clientHeight || 320);
  }
});

async function toggleCamera() {
  if (!openCvReady) return;
  const btn = document.getElementById('camToggleBtn');
  if (camStream) { stopCamera(); btn.textContent = 'Увімкнути камеру'; return; }
  log('Запит доступу до камери...');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 720 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('camVideo');
    video.srcObject = camStream;
    await new Promise((resolve) => { if (video.readyState >= 1) { resolve(); return; } video.onloadedmetadata = () => resolve(); });
    await video.play();
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camLive').classList.add('active');
    const wrapEl = document.getElementById('camWrap');
    drawGuide(wrapEl.clientWidth || video.videoWidth || 320, wrapEl.clientHeight || video.videoHeight || 320);
    btn.textContent = 'Вимкнути камеру';
    document.getElementById('rescanBtn').style.display = 'none';
    document.getElementById('camResultsBox').innerHTML = '';
    locked = false;
    resetStability();
    resetTracking();
    scanTimer = setInterval(scanFrame, 200);
  } catch (e) {
    log(`ПОМИЛКА камери: ${e.message}`);
  }
}
function stopCamera() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  document.getElementById('camVideo').srcObject = null;
  document.getElementById('camLive').classList.remove('active');
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('camStatus').textContent = 'Камеру вимкнено.';
  locked = false;
  resetStability();
  resetTracking();
  const oc = document.getElementById('overlayCanvas');
  oc.getContext('2d').clearRect(0, 0, oc.width, oc.height);
  clearGuide();
  document.getElementById('scanStatusOverlay').textContent = '';
}

function drawLiveOverlay(W, H, det, statusText) {
  const oc = document.getElementById('overlayCanvas');
  oc.width = W; oc.height = H;
  const octx = oc.getContext('2d');
  octx.clearRect(0, 0, W, H);
  if (det && det.pts) {
    const pts = det.pts;
    octx.strokeStyle = 'rgba(120,220,120,0.9)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < 4; i++) octx.lineTo(pts[i].x, pts[i].y);
    octx.closePath();
    octx.stroke();
    octx.fillStyle = 'rgba(255,200,80,0.9)';
    for (const p of pts) { octx.beginPath(); octx.arc(p.x, p.y, 5, 0, Math.PI*2); octx.fill(); }
  }
  document.getElementById('scanStatusOverlay').textContent = statusText || '';
}

function drawDecodedOverlay(W, H, det) {
  const oc = document.getElementById('overlayCanvas');
  oc.width = W; oc.height = H;
  const octx = oc.getContext('2d');
  octx.clearRect(0, 0, W, H);
  const pts = det.pts;

  octx.fillStyle = 'rgba(40,110,210,0.28)';
  octx.beginPath();
  octx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < 4; i++) octx.lineTo(pts[i].x, pts[i].y);
  octx.closePath();
  octx.fill();
  octx.strokeStyle = 'rgba(120,220,120,0.9)';
  octx.lineWidth = 2;
  octx.stroke();
  octx.fillStyle = 'rgba(255,200,80,0.95)';
  for (const p of pts) { octx.beginPath(); octx.arc(p.x, p.y, 5, 0, Math.PI*2); octx.fill(); }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let frameCounter = 0;
function scanFrame() {
  if (locked) return;
  const video = document.getElementById('camVideo');
  const wrap = document.getElementById('camWrap');
  if (!camStream || video.readyState < 2) return;

  const loSize = wrap.clientWidth || 320;
  const vw = video.videoWidth, vh = video.videoHeight;
  const hiSize = vw && vh ? Math.min(Math.min(vw, vh), 640) : loSize;

  const hiCanvas = document.createElement('canvas');
  hiCanvas.width = hiSize; hiCanvas.height = hiSize;
  const hctx = hiCanvas.getContext('2d', { willReadFrequently: true });
  if (vw && vh) {
    const sSize = Math.min(vw, vh);
    const sx = (vw - sSize) / 2, sy = (vh - sSize) / 2;
    hctx.drawImage(video, sx, sy, sSize, sSize, 0, 0, hiSize, hiSize);
  } else {
    hctx.drawImage(video, 0, 0, hiSize, hiSize);
  }
  const hiImgData = hctx.getImageData(0, 0, hiSize, hiSize);

  const loCanvas = document.createElement('canvas');
  loCanvas.width = loSize; loCanvas.height = loSize;
  const cctx = loCanvas.getContext('2d', { willReadFrequently: true });
  cctx.drawImage(hiCanvas, 0, 0, hiSize, hiSize, 0, 0, loSize, loSize);
  const imgData = cctx.getImageData(0, 0, loSize, loSize);

  const size = loSize;
  const det = detectAndDecode(imgData, size, size, hiImgData, hiSize, hiSize);
  frameCounter++;

  if (!det.ok) {
    recentCentroids = []; recentTexts = [];
    drawLiveOverlay(size, size, det, `Шукаю якорі... (${det.reason})`);
    document.getElementById('camStatus').textContent = `Пошук: ${det.reason}`;
    if (frameCounter % 5 === 0) log(`Кадр ${frameCounter}: ${det.reason}`);
    return;
  }
  if (!det.startOk || det.agreement < MIN_AGREEMENT) {
    recentCentroids = []; recentTexts = [];
    const reason = det.ambiguous
      ? 'неоднозначно: кілька поворотів одночасно пройшли старт-перевірку'
      : (!det.startOk ? 'старт-символ не збігається' : `узгодженість чексуми ${(det.agreement*100).toFixed(0)}%`);
    drawLiveOverlay(size, size, det, `Маяки знайдено (${det.mode}), ${reason}`);
    document.getElementById('camStatus').textContent = `Кандидат — ${reason}, шукаю стабільніший кадр...`;
    if (frameCounter % 5 === 0) log(`Кадр ${frameCounter}: маяки зловлено (${det.mode}), ${reason}`);
    return;
  }

  let votedText;
  try {
    votedText = decodeSectionsToText(det.sections, det.lang);
  } catch (e) {
    votedText = '';
  }
  const centroid = centroidOf(det.pts);
  const stable = checkStability(centroid, votedText + '|' + det.lang);

  drawLiveOverlay(size, size, det, stable ? 'Стабільно, декодую...' : `Стабілізація... (${recentCentroids.length}/${CONFIRM_STREAK}) [${det.mode}, ${det.lang}]`);
  document.getElementById('camStatus').textContent = stable
    ? 'Впевнено знайдено — декодую.'
    : `Кандидат (чексума ${(det.agreement*100).toFixed(0)}%, ${det.mode}, ${det.lang}) — стабілізація ${recentCentroids.length}/${CONFIRM_STREAK}`;

  if (stable) {
    locked = true;
    log(`Зафіксовано: режим=${det.mode}, мова=${det.lang}, чексума=${(det.agreement*100).toFixed(1)}%, текст="${votedText}".`);
    finishDecode(size, size, det, votedText);
  }
}

function finishDecode(W, H, det, votedText) {
  drawDecodedOverlay(W, H, det);
  const upperText = votedText.toUpperCase();
  document.getElementById('camResultsBox').innerHTML =
    `<div class="capacity-note" style="margin-bottom:6px;">Мова: ${det.lang === 'en' ? 'латиниця' : 'кирилиця'}</div>` +
    `<div class="final-result">${escapeHtml(upperText)}</div>`;
  document.getElementById('rescanBtn').style.display = 'block';
  log(`Результат: ${upperText}`);
}

function rescan() {
  locked = false;
  resetStability();
  resetTracking();
  document.getElementById('camResultsBox').innerHTML = '';
  document.getElementById('rescanBtn').style.display = 'none';
  document.getElementById('overlayCanvas').getContext('2d').clearRect(0,0,500,500);
}

document.getElementById('camToggleBtn').addEventListener('click', toggleCamera);
document.getElementById('rescanBtn').addEventListener('click', rescan);
document.getElementById('copyLogBtn').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('logBox').value); });
document.getElementById('clearLogBtn').addEventListener('click', () => { document.getElementById('logBox').value = ''; });

renderAlphabetBlocks();
refresh();
</script>
